# Generated by GitHub Copilot
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: speech-emotion-v2-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend compile check
        run: python -m compileall -q api src tests

      - name: Backend dependency consistency
        run: python -m pip check

      - name: Run backend tests
        run: pytest -q --maxfail=1

      - name: Backend dependency audit
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit -r requirements.txt --progress-spinner off

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Package frontend artifact
        run: tar -czf speech-emotion-v2-frontend-dist-${{ github.ref_name }}.tgz -C
          frontend dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            speech-emotion-v2-frontend-dist-${{ github.ref_name }}.tgz
