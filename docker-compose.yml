
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - MODEL_PATH=models/latest/model.json
      - MAX_UPLOAD_BYTES=5000000
      - MAX_REQUESTS_PER_MINUTE=120
      - CORS_ORIGINS=http://127.0.0.1:4174,http://localhost:4174
    command: sh -c "pip install -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    environment:
      - VITE_API_URL=http://127.0.0.1:8001
      - VITE_MAX_UPLOAD_MB=5
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4174"
    ports:
      - "4174:4174"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    depends_on:
      - api
