<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">speech-emotion-v2 architecture overview</title>
  <desc id="desc">Audio client to FastAPI inference API with model artifacts, metrics, and frontend visualization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#38bdf8"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .head { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .body { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .edge { stroke: #38bdf8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edge2 { stroke: #34d399; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="50" y="60" class="title">speech-emotion-v2 Architecture</text>
  <text x="50" y="90" class="subtitle">Secure audio inference path with deterministic model lifecycle and observability</text>

  <rect x="60" y="170" width="250" height="160" rx="16" fill="url(#card)" stroke="#334155"/>
  <text x="84" y="214" class="head">Audio Clients</text>
  <text x="84" y="246" class="body">Recorder and WAV upload</text>
  <text x="84" y="270" class="body">browser + API consumers</text>

  <rect x="370" y="120" width="360" height="260" rx="18" fill="url(#card)" stroke="#1d4ed8"/>
  <text x="394" y="164" class="head">FastAPI Inference API</text>
  <text x="394" y="196" class="body">Strict file and duration validation</text>
  <text x="394" y="220" class="body">Rate limit + optional API key auth</text>
  <text x="394" y="244" class="body">Endpoints: /predict, /health</text>
  <text x="394" y="268" class="body">Metrics: /metrics</text>
  <text x="394" y="292" class="body">Model info: /model/info</text>

  <rect x="790" y="120" width="320" height="160" rx="16" fill="url(#card)" stroke="#7c3aed"/>
  <text x="814" y="164" class="head">Model Artifacts</text>
  <text x="814" y="196" class="body">models/latest/model.json</text>
  <text x="814" y="220" class="body">versioned release copies</text>

  <rect x="790" y="320" width="320" height="160" rx="16" fill="url(#card)" stroke="#047857"/>
  <text x="814" y="364" class="head">Prometheus</text>
  <text x="814" y="396" class="body">scrapes /metrics for</text>
  <text x="814" y="420" class="body">latency and error telemetry</text>

  <rect x="370" y="430" width="360" height="170" rx="16" fill="url(#card)" stroke="#0891b2"/>
  <text x="394" y="474" class="head">React Frontend</text>
  <text x="394" y="506" class="body">Predict request orchestration</text>
  <text x="394" y="530" class="body">confidence and error feedback</text>

  <path class="edge" d="M310 250 L370 250"/>
  <path class="edge" d="M730 200 L790 200"/>
  <path class="edge" d="M730 330 L790 370"/>
  <path class="edge2" d="M550 380 L550 430"/>
</svg>
